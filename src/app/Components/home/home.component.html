<section id="hero" class="hero-section">
    <div class="container relative z-10 mx-auto px-6 py-20 md:py-28">
        <div class="hero-layout">
            <div class="hero-content">
                <div class="hero-rule"></div>
                <span class="hero-eyebrow">Moretti Carvalho Pires</span>
                <h1 class="hero-title font-lora">
                    <span class="hero-title-line">Clareza para decidir.</span>
                    <span class="hero-title-line hero-title-accent">Segurança para avançar.</span>
                </h1>
                <p class="hero-subtitle">Previna conflitos, proteja seu patrimônio e planeje o futuro.</p>
                <div class="hero-actions">
                    <a [routerLink]="['/home']" fragment="contact" class="hero-button-primary">Fale Conosco</a>
                    <a [routerLink]="['/home']" fragment="area-activity" class="hero-button-secondary">Áreas de Parceria</a>
                </div>
                <div class="trust-list" aria-label="Diferenciais do escritório">
                    <span class="trust-item"><strong>Atendimento</strong> direto com advogados</span>
                    <span class="trust-item"><strong>Atuação</strong> em todo o Brasil</span>
                    <span class="trust-item"><strong>Consulta</strong> online e segura</span>
                </div>
            </div>
            <img
                class="legal-seal"
                src="/logo-inicial.png"
                alt="Moretti Carvalho Pires Advocacia">
        </div>
    </div>
</section>

<div id="about">
    <app-about></app-about>
</div>

<div id="area-activity">
    <app-area-activity></app-area-activity>
</div>

<div id="publications">
    <app-background-experience></app-background-experience>
</div>

<div id="contact">
    <app-contact></app-contact>
</div>
