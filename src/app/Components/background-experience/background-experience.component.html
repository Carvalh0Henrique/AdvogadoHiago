<section appRevealOnScroll id="publicacoes" class="publications-section" aria-labelledby="publications-title">
  <div class="container mx-auto px-6">
    <header class="publications-heading">
      <span class="publications-eyebrow">Conteúdo jurídico</span>
      <h2 id="publications-title">Publicações no Instagram</h2>
      <span class="heading-rule" aria-hidden="true"></span>
      <p>Informação jurídica selecionada pelo nosso time, apresentada de forma clara e conectada à sua rotina.</p>
      <a class="profile-link" [href]="profileUrl" target="_blank" rel="noopener noreferrer">
        <lucide-icon name="instagram" [strokeWidth]="1.8" aria-hidden="true"></lucide-icon>
        <span>Seguir &#64;moretticarvalhopires</span>
      </a>
    </header>

    <div class="carousel" aria-roledescription="carrossel" aria-label="Publicações do escritório no Instagram">
      <button type="button" class="carousel-control carousel-control-previous"
        aria-label="Ver publicações anteriores" [disabled]="currentPage === 0" (click)="previousPage()">
        <lucide-icon name="chevron-left" [strokeWidth]="1.8" aria-hidden="true"></lucide-icon>
      </button>

      <div class="carousel-viewport">
        <div class="publications-grid">
          <a *ngFor="let post of visiblePosts; trackBy: trackByUrl"
            class="instagram-card" [href]="post.url" target="_blank" rel="noopener noreferrer"
            [attr.aria-label]="'Ver no Instagram: ' + post.descricao">
            <div class="publication-cover">
              <img [src]="post.imagem" [alt]="post.descricao" loading="lazy">
              <span class="instagram-badge" aria-hidden="true">
                <lucide-icon name="instagram" [strokeWidth]="1.8"></lucide-icon>
              </span>
            </div>

            <div class="publication-content">
              <span class="post-profile">{{ post.perfil }}</span>
              <strong>{{ post.advogado }}</strong>
              <p>{{ post.descricao }}</p>
              <span class="instagram-link">
                Ver publicação no Instagram
                <span aria-hidden="true">&rarr;</span>
              </span>
            </div>
          </a>
        </div>
      </div>

      <button type="button" class="carousel-control carousel-control-next"
        aria-label="Ver próximas publicações" [disabled]="currentPage === totalPages - 1" (click)="nextPage()">
        <lucide-icon name="chevron-right" [strokeWidth]="1.8" aria-hidden="true"></lucide-icon>
      </button>
    </div>

    <div class="carousel-pagination" aria-label="Selecionar página de publicações">
      <button *ngFor="let page of pages; let index = index" type="button"
        [class.active]="index === currentPage" [attr.aria-label]="'Ir para a página ' + (index + 1)"
        [attr.aria-current]="index === currentPage ? 'true' : null" (click)="goToPage(index)"></button>
    </div>
  </div>
</section>
