<section appRevealOnScroll id="areas-atuacao" class="py-20 bg-gray-50">
    <div class="container mx-auto px-6 text-center">
        <h2 class="section-title-serif text-3xl md:text-4xl font-bold text-primary mb-4">Áreas de Atuação</h2>
        <div class="w-24 h-1 bg-secondary mx-auto mb-6"></div>
        <p class="max-w-3xl mx-auto text-gray-600 mb-12">Conheça os temas que podem ser objeto de parcerias com a Moretti Carvalho Pires.</p>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <article
                *ngFor="let area of practiceAreas"
                class="bg-white p-8 rounded-lg shadow-lg border border-gray-100 text-center flex flex-col">
                <div class="inline-flex self-center p-4 bg-primary text-white rounded-full mb-4">
                    <lucide-icon
                        [name]="area.icon"
                        class="h-8 w-8"
                        [strokeWidth]="1.5"
                        aria-hidden="true">
                    </lucide-icon>
                </div>

                <h3 class="text-xl font-bold text-primary mb-2">{{ area.title }}</h3>
                <p class="text-gray-600 mb-4">{{ area.description }}</p>

                <ul class="text-left space-y-2 text-gray-600 mb-4">
                    <li *ngFor="let service of area.services" class="flex items-start">
                        <span class="text-secondary font-bold mr-2" aria-hidden="true">&#10003;</span>
                        <span>{{ service }}</span>
                    </li>
                </ul>

                <a
                    [routerLink]="['/home']"
                    fragment="contact"
                    class="mt-auto font-bold text-secondary hover:text-secondary-hover">
                    Saiba mais &rarr;
                </a>
            </article>
        </div>
    </div>
</section>
